{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="mb-3">
            <a href="{% url 'lista_pacientes' %}" class="text-decoration-none text-secondary small">Voltar para a listagem</a>
        </div>
        <div class="card card-custom p-4">
            <h4 class="fw-bold text-dark mb-4 border-bottom pb-2">{{ titulo }}</h4>
            
            <form method="POST" autocomplete="off">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1 font-monospace">{{ field.errors.0 }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                
                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="{% url 'lista_pacientes' %}" class="btn btn-light border px-4">Cancelar</a>
                    <button type="submit" class="btn btn-med px-4 fw-bold">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const cpfInput = document.querySelector('input[name="cpf"]');
        const telInput = document.querySelector('input[name="telefone"]');

        if(cpfInput) {
            cpfInput.addEventListener('input', function (e) {
                let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,3})(\d{0,2})/);
                e.target.value = !x[2] ? x[1] : x[1] + '.' + x[2] + (x[3] ? '.' + x[3] : '') + (x[4] ? '-' + x[4] : '');
            });
        }

        if(telInput) {
            telInput.addEventListener('input', function (e) {
                let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
                e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
            });
        }
    });
</script>
{% endblock %}
