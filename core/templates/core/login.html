{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-md-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">CareFlow</h2>
            <p class="text-muted">Acesso restrito ao painel clínico</p>
        </div>
        <div class="card card-custom p-4">
            <h4 class="fw-bold mb-3 text-center">Autenticação</h4>
            
            {% if form.errors %}
                <div class="alert alert-danger py-2 small text-center" role="alert">
                    Usuário ou senha inválidos.
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label small fw-bold text-secondary">Usuário</label>
                    <input type="text" name="username" id="id_username" class="form-control" placeholder="Digite o usuário" required>
                </div>
                <div class="mb-4">
                    <label for="id_password" class="form-label small fw-bold text-secondary">Senha</label>
                    <input type="password" name="password" id="id_password" class="form-control" placeholder="Digite a senha" required>
                </div>
                <button type="submit" class="btn btn-med w-100 py-2 fw-bold">Entrar</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
